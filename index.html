                <div class="text-center">
                    <h2 class="text-2xl font-bold mb-4 text-white">最後一步！</h2>
                    <p class="text-slate-400 mb-8">請留下您的 Email，我們將把分析報告寄送給您，並跳轉至諮詢表單。</p>
                    <input type="email" id="userEmail" placeholder="您的電子郵件地址" required>
                    <button onclick="finalSubmit()" id="submitBtn" class="w-full bg-gradient-to-r from-sky-600 to-blue-700 py-5 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-xl">
                        送出並領取解決方案
                    </button>
                </div>`;
        }
    }

    function selectInd(i) { pushState({ step: 'role', industry: i }); }
    function selectRole(r) { pushState({ step: 'quiz', role: r, currentQ: 0, score: 0 }); }
    function answer(p) { 
        if (state.currentQ < 9) { pushState({ currentQ: state.currentQ + 1, score: state.score + p }); } 
        else { pushState({ step: 'guide', guideStep: 0, score: state.score + p }); }
    }
    function nextGuide() {
        if (state.guideStep < 1) { state.guideStep++; render(); } 
        else { state.step = 'email'; render(); }
    }
    function pushState(newData) { state.history.push(JSON.parse(JSON.stringify(state))); state = { ...state, ...newData }; render(); }
    function goBack() { if (state.history.length > 0) { state = state.history.pop(); render(); } }

    async function finalSubmit() {
        const email = document.getElementById('userEmail').value;
        if (!email || !email.includes('@')) { alert('請輸入有效的 Email'); return; }
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "傳送中...";

        const rankText = state.score >= 70 ? "極高風險" : (state.score >= 40 ? "中度風險" : "低度風險");
        const finalForm = "https://docs.google.com/forms/d/e/1FAIpQLSfyKcd3E9jPZL5JXlN8gJABMYpSP4kf6zbSiZ-tZCnr2KKZvg/viewform";

        try {
            // 背景同步到舊的 Google Sheet
            const formData = new URLSearchParams({
                "entry.1189791047": state.industry,
                "entry.1232382204": state.role,
                "entry.1872913577": state.score,
                "entry.1057217280": rankText,
                "entry.1111111111": email
            });
            fetch(`https://docs.google.com/forms/d/e/1FAIpQLSfte6OLpSk5SRrs2SpICabxlPiRuNbyPUwVxpEaFAQHHY6G1Q/formResponse`, { method: "POST", mode: "no-cors", body: formData });

            // EmailJS
            await emailjs.send("service_7o6i6un", "template_48fngls", {
                user_email: email,
                score: state.score,
                industry: state.industry,
                rank: rankText
            });

            // 跳轉到你指定的 Google 表單
            window.location.href = finalForm;
        } catch (e) {
            window.location.href = finalForm;
        }
    }

    window.onload = render;
</script>
</body>
</html>
