            100% { box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }

    let state = { step: 'start', industry: '', role: '', currentQ: 0, score: 0, history: [], guideStep: 0 };

    function render() {
        const app = document.getElementById('app');
        if (state.step === 'start') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <h1 class="text-2xl md:text-4xl font-black mb-3 text-white">數位資產風險診斷</h1>
                    <p class="text-slate-400 mb-8 text-sm">選擇行業，開始精準體檢：</p>
                    <div class="grid grid-cols-1 gap-2">
                        ${Object.keys(quizData).map(ind => `<button onclick="selectInd('${ind}')" class="btn-choice p-4 rounded-xl font-bold">${ind}</button>`).join('')}
                    </div>
                </div>`;
        } 
        else if (state.step === 'role') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <h2 class="text-xl font-bold mb-8 text-white">您的職位是？</h2>
                    <div class="flex flex-col gap-4">
                        <button onclick="selectRole('老闆')" class="btn-choice p-5 rounded-2xl font-black text-lg text-center">老闆 / 決策者</button>
                        <button onclick="selectRole('員工')" class="btn-choice p-5 rounded-2xl font-black text-lg text-center">員工 / 執行者</button>
                    </div>
                    <button onclick="goBack()" class="mt-8 text-slate-500 text-sm hover:text-white transition">← 返回</button>
                </div>`;
        } 
        else if (state.step === 'quiz') {
            const questions = quizData[state.industry][state.role];
            const q = questions[state.currentQ];
            const progress = ((state.currentQ + 1) / questions.length) * 100;
            app.innerHTML = `
                <div class="fade-in">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-black text-sky-500 tracking-widest uppercase">SCANNING... STEP ${state.currentQ+1}/${questions.length}</span>
                        <span class="text-[10px] text-slate-500">${Math.round(progress)}%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
                    <h2 class="question-text">${q[0]}</h2>
                    <div class="flex flex-col gap-3">
                        <button onclick="answer(0)" class="btn-choice p-4 rounded-xl text-slate-300 hover:text-white">${q[1]}</button>
                        <button onclick="answer(5)" class="btn-choice p-4 rounded-xl text-slate-300 hover:text-white">${q[2]}</button>
                        <button onclick="answer(9)" class="btn-choice p-4 rounded-xl text-slate-300 hover:text-white">${q[3]}</button>
                        <button onclick="answer(12)" class="btn-choice p-4 rounded-xl text-slate-300 hover:text-white">${q[4]}</button>
                    </div>
                    <div class="text-center"><button onclick="goBack()" class="mt-8 text-slate-500 text-sm hover:text-white transition">← 返回上一題</button></div>
                </div>`;
        } 
        else if (state.step === 'guide') {
            const finalScore = Math.min(state.score, 100);
            const isCritical = finalScore >= 70;
            const statusColor = isCritical ? "text-red-500" : "text-orange-500";
            const storyLine = [
                { q: "這分數背後隱藏著巨大的法律危機。<br>您對現有的資料系統感到「真的放心」嗎？", btn: "坦白說，我並不放心", warn: `⚠️ 警告：個資法罰鍰最高可達 **1,500 萬元**，且負責人須負刑事責任。` },
                { q: "很多企業想改善卻步，是因為擔憂...<br>「系統安裝完後，員工真的會用嗎？」", btn: "是的，我擔心操作太複雜", warn: `🚨 您目前的防線漏洞，平均每月讓企業損失高達 **30% 的品牌信任度**。` },
                { q: "最後一個關鍵：您是否認為資安就是一筆「昂貴且看不到回報」的成本？", btn: "確實有這層顧慮", warn: `💡 我們提供的是「自動化防護」，不影響效率且符合法規，將風險降至趨近於零。` }
            ];
            const currentStory = storyLine[state.guideStep];
            
            app.innerHTML = `
                <div class="fade-in text-center">
                    <div id="displayScore" class="score-num ${statusColor}">0</div>
                    <div class="text-lg font-black mb-6 ${statusColor} tracking-widest">${isCritical ? '⚠️ 極高風險狀態' : '🚨 中度風險警示'}</div>
                    <div class="text-xs text-red-400/90 bg-red-950/30 p-4 rounded-xl mb-8 font-bold border border-red-500/20">${currentStory.warn}</div>
                    <h2 class="text-lg font-bold mb-10 leading-tight text-white">${currentStory.q}</h2>
                    <button onclick="nextGuide()" class="next-step-btn w-full rounded-2xl text-white">${currentStory.btn}</button>
                    <div class="text-center"><button onclick="goBack()" class="mt-8 text-slate-500 text-sm hover:text-white transition">← 返回修改</button></div>
                </div>`;

            // 跳表動畫邏輯 (僅在 guide 第一步觸發)
            if (state.guideStep === 0) {
                animateValue("displayScore", 0, finalScore, 1500);
            } else {
                document.getElementById('displayScore').innerText = finalScore;
            }
        }
        else if (state.step === 'email') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <h2 class="text-2xl font-black mb-4 text-white">解決您的數位焦慮</h2>
                    <p class="text-slate-400 mb-8 text-sm">留下Email領取測驗結果，並跳轉至個資安全與合規現況需求調查表單</p>
                    <input type="email" id="userEmail" placeholder="您的電子信箱" required class="mb-6">
                    <button onclick="finalSubmit()" id="submitBtn" class="w-full bg-red-600 hover:bg-red-500 py-4 rounded-2xl font-black text-lg shadow-xl">填寫完畢並送出！</button>
                </div>`;
        }
    }

    // 跳表動畫函式
    function animateValue(id, start, end, duration) {
        const obj = document.getElementById(id);
        if (!obj) return;
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            // 使用 easeOutExpo 讓結尾變慢更有質感
            const easedProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
            obj.innerHTML = Math.floor(easedProgress * (end - start) + start);
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    function selectInd(i) { pushState({ step: 'role', industry: i }); }
    function selectRole(r) { pushState({ step: 'quiz', role: r, currentQ: 0, score: 0 }); }
    function answer(p) { 
        const questions = quizData[state.industry][state.role];
        let nextScore = state.score + p;
        if (state.currentQ < questions.length - 1) { pushState({ currentQ: state.currentQ + 1, score: nextScore }); } 
        else { pushState({ step: 'guide', guideStep: 0, score: nextScore }); }
    }
    function nextGuide() { if (state.guideStep < 2) { state.guideStep++; render(); } else { state.step = 'email'; render(); } }
    function pushState(newData) { state.history.push(JSON.parse(JSON.stringify(state))); state = { ...state, ...newData }; render(); }
    function goBack() { if (state.history.length > 0) { state = state.history.pop(); render(); } }
    async function finalSubmit() {
        const email = document.getElementById('userEmail').value;
        if (!email.includes('@')) { alert('格式不正確'); return; }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "傳送中...";
        const finalScore = Math.min(state.score, 100);
        const rankText = finalScore >= 70 ? "極高風險" : (finalScore >= 40 ? "中度風險" : "低度風險");
        try {
            await emailjs.send("service_7o6i6un", "template_48fngls", { user_email: email, score: finalScore, industry: state.industry, rank: rankText });
            window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfyKcd3E9jPZL5JXlN8gJABMYpSP4kf6zbSiZ-tZCnr2KKZvg/viewform";
        } catch (e) {
            window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfyKcd3E9jPZL5JXlN8gJABMYpSP4kf6zbSiZ-tZCnr2KKZvg/viewform";
        }
    }
    window.onload = render;
</script>
