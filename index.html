    <style>

        .subtitle-text { color: #94a3b8; font-size: 0.95rem; text-align: center; margin-bottom: 30px; }

        .q-title { font-size: clamp(1.1rem, 4.5vw, 1.35rem); font-weight: 700; line-height: 1.6; margin-bottom: 25px; color: #ffffff; }
        .btn-answer, .btn-option, .btn-role { width: 100%; padding: 14px 18px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #e2e8f0; text-align: left; font-size: 0.95rem; transition: all 0.2s ease; margin-bottom: 12px; cursor: pointer; }
        .btn-option, .btn-role { text-align: center; font-weight: 600; }
        .btn-answer:active, .btn-option:active { transform: scale(0.98); background: rgba(14, 165, 233, 0.3); }
        .email-input { width: 100%; padding: 14px; background: #0f172a; border: 1.5px solid rgba(255, 255, 255, 0.1); border-radius: 10px; color: white; margin-bottom: 10px; font-size: 16px; }

        .risk-level { font-size: 2.5rem; font-weight: 900; text-align: center; margin-bottom: 10px; }
        .score-val { font-size: 3rem; color: white; font-weight: 900; }
        .hidden { display: none !important; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    <script>
        // 題目資料庫 - 完全保留原字、原意、原分數
        const allQuestions = {
            "clinic_boss": [
                { q: "診所內的病患資料（如病歷、聯絡方式）通常如何儲存與調用？", a: ["集中儲存於醫療系統，且所有調用都有紀錄", "以醫療系統為主，但部分資料會額外記錄在Excel或紙本", "系統、紙本、通訊軟體工具混用，無統一存放點", "資料分散在不同設備且無法有效掌握完整流向"], p: [0, 5, 10, 15] },
                { q: "針對診所內不同職位（醫師、護理、行政），是否有嚴格的資料存取權限控管？", a: ["有，嚴格依職務分級開放權限，且定期審核", "有初步區分，但部分帳號權限有重疊或過高", "多數人員皆可看見完整的病患聯絡資訊與病歷", "幾乎沒有權限區分，員工可隨意查閱所有資料"], p: [0, 5, 10, 15] },
                { q: "診所平時與病患溝通時，資料傳遞（如檢查結果、預約資訊）的主要方式？", a: ["僅透過診所官方帳號或加密系統發送", "以官方管道為主，偶爾使用員工個人工具輔助", "常因便利性直接將資料截圖或複製至非正式管道傳送", "幾乎沒有限制，員工常以私人工具與病患交換資訊"], p: [0, 5, 10, 15] },
                { q: "診所員工是否被允許使用私人手機或平板接觸或處理病患個資？", a: ["明確禁止使用私人設備處理任何敏感個資", "偶爾因特殊狀況使用，但事後無留存紀錄", "多數情境下皆允許員工使用個人設備處理公務資料", "完全沒有限制，員工私人設備普遍存在病患個資"], p: [0, 5, 10, 15] },
                { q: "診所曾發生過因人為疏失（如傳錯對象、帳號遭盜用）導致資料外流的情況嗎？", a: ["從未發生過，且有預防性教育與機制", "偶爾發生小範圍失誤，但未造成後續損害", "發生過數次失誤且曾造成病患投訴或困擾", "發生過嚴重外洩，且對診所信譽產生實際衝擊"], p: [0, 5, 10, 20] },
                { q: "診所內各項行政或醫療系統的帳號密碼管理方式？", a: ["每人擁有專屬帳號密碼，且操作行為皆可追蹤", "雖然有個人帳號，但密碼管理欠缺（如寫在桌上）", "部分帳號由多人共用，難以界定特定操作責任", "多數系統帳號為共用狀態，無法追蹤誰動過資料"], p: [0, 5, 10, 15] },
                { q: "面對可疑的訊息通知（如自稱健保局、藥商連結），診所是否有明確的應對準則？", a: ["有明確的辨識流程，且員工會主動通報回報", "員工大致知道如何判斷，但無固定回報標準", "曾發生過員工誤點可疑連結或輸入資料的情況", "員工普遍缺乏警覺，曾因點擊不當內容造成風險"], p: [0, 5, 10, 15] },
                { q: "您是否能確定病患的完整個資目前並未留存在任何離職員工的個人設備中？", a: ["幾乎能確定，離職時皆有執行清查與切結程序", "偶爾有離職員工帶走資料的疑慮，但無實際確認", "已知有部分離職員工持有或曾帶走診所相關資料", "普遍存在離職員工帶走資料的情況，且難以控管"], p: [0, 5, 10, 15] },
                { q: "當員工離職時，診所收回其存取權限（如系統帳號、LINE 群組）的速度？", a: ["離職當天即完成所有帳號停權與資料清除確認", "短時間內（如一週內）會完成，但有時會遺漏", "偶爾會發生離職很久後帳號仍未停權的情況", "沒有固定的權限收回流程，離職員工仍可能登入"], p: [0, 5, 10, 15] },
                { q: "若今天發生大規模資料外洩，診所是否有明確的危機處理流程與法律應對方案？", a: ["有完整的流程與法律顧問，能第一時間止損應對", "大致知道要如何處理，但缺乏完整的演練規劃", "目前缺乏完整的處理機制，發生時只能臨時決策", "完全沒有任何應對準備，對法律風險亦不甚了解"], p: [0, 5, 10, 20] }
            ],
            "clinic_staff": [
                { q: "在診所日常工作中，您能接觸到的病患個資（如電話、住址）範圍為何？", a: ["僅限於該職務必要接觸的極少部分內容", "大部分病患的基本聯絡資料皆可隨意點閱", "幾乎可以看見完整的醫療診斷紀錄與病患全資", "沒有任何權限限制，所有人的病歷與資訊皆可查"], p: [0, 5, 10, 15] },
                { q: "當病患在社群平台（如 LINE）詢問個人資訊時，您的處理方式通常是？", a: ["僅引導至診所官方系統查詢或依照正規管道發布", "偶爾會為了服務效率，私下用個人 LINE 傳給病患", "常直接將病患資料截圖，透過通訊軟體直接傳送", "幾乎所有病患溝通與資料往來都在個人通訊軟體"], p: [0, 5, 10, 15] },
                { q: "您是否曾因工作方便，使用個人手機拍攝、存取或傳送病患的相關資料？", a: ["從未發生過，診所嚴格要求禁止使用個人設備", "偶爾因電腦故障或急用，會短暫使用手機處理", "經常使用私人設備進行溝通或資料傳遞以求效率", "私人設備與公務設備已高度重疊，資料都在其中"], p: [0, 5, 10, 15] },
                { q: "您的個人手機或相簿中，目前是否存有任何病患的個資截圖、報表或照片？", a: ["完全沒有，這是我非常注意避免的行為", "有極少數的過往工作紀錄，但尚未進行清理", "存有一定數量的病患資料，用於平時工作參考", "存有非常多病患資料，且這在診所內是普遍現象"], p: [0, 5, 10, 15] },
                { q: "在傳送病患資訊（如報名表或結果）時，是否曾發生傳錯對象或傳至群組的情況？", a: ["沒有發生過，傳送前都會經過多次確認", "偶爾發生差點傳錯的情形，但有及時攔截", "曾實際發生過傳錯對象，並造成病患端疑慮", "發生過數次傳錯情事，且對診所造成實際麻煩"], p: [0, 5, 10, 15] },
                { q: "關於診所行政或醫療系統的帳號，您目前的登入習慣是？", a: ["僅使用自己的專屬帳號，且不會與他人共用密碼", "有專屬帳號，但有時會為了方便將密碼告訴同事", "帳號是小組或前台共用的，多人知曉同一組密碼", "並不清楚是否有區分，大家都用同一個帳號登入"], p: [0, 5, 10, 15] },
                { q: "當您收到包含網址連結的通知（如醫療補助或健保局公文）時？", a: ["一定先確認發送來源與官方公告，不敢隨意點擊", "視情況判斷，如果是工作群組傳來的就會點開", "曾直接點擊過看似正式但來路不明連結", "曾因誤點連結導致設備中毒或造成資安問題"], p: [0, 5, 10, 15] },
                { q: "對於「哪些資料屬於不能外流的營業秘密或個資」，診所是否提供明確訓練？", a: ["非常清楚，診所有提供教育訓練且有簽署規範", "大致了解，但細部的法律邊界與風險不太清楚", "有些模糊，主要是靠自己平常的經驗與習慣判斷", "完全不清楚，沒人告知過哪些資料外傳會有法律責任"], p: [0, 5, 10, 15] },
                { q: "若發現同事資料處理不當（如將資料帶走或亂傳），您的通常反應是？", a: ["會立即依照診所規定的流程進行通報或回報", "會視情節大小決定，嚴重的話才會跟上級反映", "通常會先觀望，或私下提醒同事但不會主動回報", "認為這是大家的習慣，不會特別覺得這需要處理"], p: [0, 5, 10, 15] },
                { q: "如果您計畫離職，您通常會如何處理手機或電腦中留下的病患相關資料？", a: ["會主動在離職前將所有工作相關個資進行清空", "會清理大部分，但可能留存一些關鍵資料作參考", "並不會特別去清理，除非診所有強烈要求或檢查", "會全數保留，因為這些資料未來對我的職涯發展有幫助"], p: [0, 5, 10, 15] }
            ],
            "ecommerce_boss": [
                { q: "貴公司的訂單資料與客戶清單，目前主要的流動與存放狀態為何？", a: ["嚴格鎖定於官網後台系統，無法隨意匯出或下載", "以系統為主，但員工會因分析需求偶爾匯出至Excel", "資料經常被匯出至多個員工設備中進行處理與追蹤", "資料存放在分散的雲端空間與設備中，難以追蹤流向"], p: [0, 5, 10, 15] },
                { q: "員工接觸客戶聯絡資訊（如姓名、電話、地址）的權限範圍？", a: ["僅限於客服或物流必要接觸的極少部分資訊", "部分人員可查閱訂單全資，權限控管尚不完全", "多數員工皆可看見完整的客戶名單與購買紀錄", "幾乎沒有權限區分，員工可隨意取得客戶聯絡全資"], p: [0, 5, 10, 15] },
                { q: "員工是否會將後台資料用於系統以外的用途（如個人私下聯繫、推銷）？", a: ["明確禁止且有系統監測，從未發生相關情事", "偶爾因工作上的急需，員工會用個人工具聯繫客戶", "已知員工有自行延伸應用客戶資料的情況發生", "無法掌握，員工常將資料與個人通訊錄混雜應用"], p: [0, 5, 10, 15] },
                { q: "公司電商後台（如 Shopify, Shopline）的權限管理方式為何？", a: ["每個人擁有獨立權限的帳號，操作行為皆有軌跡紀錄", "有個人帳號，但內部密碼共享嚴重或權限開太廣", "部分核心權限帳號由多人共用，出事難以界定責任", "長期多人共用一組主帳號，甚至外部接案也知曉"], p: [0, 5, 10, 15] },

                { q: "員工是否被允許在家中或使用私人電腦登入電商後台處理公務？", a: ["嚴格限制僅能使用公司受管控的設備進行登入", "偶爾允許私人設備登入，但無相關安全監控措施", "員工普遍使用私人設備作業，且帳號密碼常存於瀏覽器", "完全沒有限制，員工隨時隨地可由任何設備讀取全資"], p: [0, 5, 10, 15] },

        let state = { history: [], current: { step: 'start', industry: '', role: '', currentQ: 0, score: 0 } };

        function render() {
            const container = document.getElementById('main-content');
            const backBtn = document.getElementById('back-btn');
            const footer = document.getElementById('quiz-footer');
            const { step, currentQ, industry, role, score } = state.current;

            backBtn.classList.toggle('hidden', state.history.length === 0 || step === 'result');
            footer.classList.toggle('hidden', step !== 'questions');

            let html = '';
            if (step === 'start') {
                html = `<div class="text-center fade-in"><h1 class="logo-text">資安讚</h1><p class="subtitle-text">數位資產風險診斷系統</p><div class="p-5 bg-slate-800/40 rounded-xl mb-10 text-xs text-slate-400 border border-white/5">10 項關鍵指標檢測<br>即刻洞察資產安全防禦力</div><button onclick="push({step:'industry'})" class="w-full py-4 bg-sky-500 rounded-xl text-lg font-bold hover:bg-sky-400 transition-all shadow-lg shadow-sky-500/20">開始診斷</button></div>`;
            } else if (step === 'industry') {
                html = `<div class="fade-in"><h2 class="text-center text-lg mb-6 font-bold">選擇所屬行業</h2><button onclick="push({step:'role', industry:'clinic'})" class="btn-option">🏥 醫療診所</button><button onclick="push({step:'role', industry:'ecommerce'})" class="btn-option">🌐 電商平台</button><button onclick="push({step:'role', industry:'retail'})" class="btn-option">🛍️ 實體零售</button></div>`;
            } else if (step === 'role') {
                html = `<div class="fade-in"><h2 class="text-center text-lg mb-6 font-bold">選擇診斷身分</h2><button onclick="push({step:'questions', role:'boss'})" class="btn-role">我是 老闆 / 決策者</button><button onclick="push({step:'questions', role:'staff'})" class="btn-role">我是 員工 / 執行端</button></div>`;
            } else if (step === 'questions') {
                const qSet = allQuestions[`${industry}_${role}`];
                const q = qSet[currentQ];
                document.getElementById('progress-bar').style.width = ((currentQ + 1) / 10) * 100 + '%';
                document.getElementById('progress-text').innerText = `STEP ${currentQ + 1} / 10`;
                html = `<div class="fade-in"><span class="q-label uppercase">Question ${currentQ + 1}</span><h2 class="q-title">${q.q}</h2>${q.a.map((ans, i) => `<button onclick="answer(${q.p[i]})" class="btn-answer">${ans}</button>`).join('')}</div>`;
            } else if (step === 'result') {
                let lvl = score >= 120 ? "極高危險" : score >= 40 ? "中度警戒" : "低度風險";
                let riskColor = score >= 120 ? "text-red-500" : score >= 40 ? "text-orange-400" : "text-green-400";
                html = `<div class="text-center fade-in"><h2 class="risk-level ${riskColor}">${lvl}</h2><p class="score-display text-slate-400">總診斷分數 <span class="score-val">${score}</span></p><div class="bg-slate-900/60 p-5 rounded-xl text-left border border-white/5 my-6"><p class="text-xs text-slate-400 leading-relaxed mb-4">診斷顯示您的組織存在安全隱憂。請輸入信箱以獲取改善建議報告。</p><input type="email" id="user-email" placeholder="Email 地址" class="email-input"><button id="submit-email" onclick="handleEmailSubmit(${score})" class="w-full py-3 bg-sky-500 rounded-lg font-bold text-sm">獲取報告</button><p id="success-msg" class="hidden text-green-400 text-[10px] mt-2 text-center">發送成功！請檢查信箱。</p></div><button onclick="restart()" class="text-slate-500 text-xs underline">重新測試</button></div>`;
            }
            container.innerHTML = html;
        }

        // [保險植入 2] 升級後的發信邏輯：先 EmailJS 給客戶，後 Formspree 備份
        async function handleEmailSubmit(score) {
            const btn = document.getElementById('submit-email');
            const emailValue = document.getElementById('user-email').value;
            const msg = document.getElementById('success-msg');
            
            if(!emailValue.includes('@')) return alert('請輸入有效信箱');
            
            btn.innerText = "發送中..."; 
            btn.disabled = true;

            let lvl = score >= 120 ? "極高危險" : score >= 40 ? "中度警戒" : "低度風險";

            // 準備發給 EmailJS 的參數
            const templateParams = {
                user_email: emailValue,
                score: score,
                rank: lvl
            };

            try {
                // 第一步：寄信給客戶 (EmailJS)
                await emailjs.send("service_2kl2ayr", "template_jsl6mbh", templateParams);

                // 第二步：資料備份到 Formspree
                await fetch("https://formspree.io/f/mqakvwdw", {
                    method: "POST", 
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        email: emailValue, 
                        score: score, 
                        industry: state.current.industry, 
                        role: state.current.role,
                        risk_rank: lvl
                    })
                });

                btn.innerText = "已成功送出"; 
                msg.classList.remove('hidden');
            } catch (error) {
                console.error("發送失敗:", error);
                alert("報告傳送暫時發生問題，請稍後再試。");
                btn.innerText = "重新獲取報告";
                btn.disabled = false;
            }
        }

        function push(newData) { state.history.push(JSON.parse(JSON.stringify(state.current))); state.current = { ...state.current, ...newData }; render(); }
        function goBack() { if (state.history.length > 0) { state.current = state.history.pop(); render(); } }
        function answer(p) { 
            const nextScore = state.current.score + p; 
            if (state.current.currentQ < 9) push({ currentQ: state.current.currentQ + 1, score: nextScore }); 
            else push({ step: 'result', score: nextScore }); 
        }
        function restart() { state = { history: [], current: { step: 'start', industry: '', role: '', currentQ: 0, score: 0 } }; render(); }
        window.onload = render;
    </script>
</body>
</html>
