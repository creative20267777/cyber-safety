                ["收到來源不明的附件會先掃毒嗎？", "必先查證並掃毒，不隨意開啟", "視寄件人而定，大致認識就會開", "不管來源，只要標題吸引就點開", "不知道有毒，曾有點開造成中毒"],
                ["是否曾隨手將公司內部公告傳出？", "非常謹慎，從不對外討論內務", "曾誤傳給朋友，隨後回收並道歉", "不覺得內部公告有誤傳風險", "沒想過此問題，好玩有趣就傳"],
                ["離職後是否仍留在前東家的工作群？", "離職當天必退，或由管理員踢出", "部分群組仍留著，因為關係還不錯", "沒退過群，甚至仍有權限觀看", "從未被踢出，也沒主動退出過"]
            ]
        }
    };

    let state = { step: 'start', industry: '', role: '', currentQ: 0, score: 0, history: [], email: '' };

    function render() {
        const app = document.getElementById('app');
        window.scrollTo(0, 0);

        if (state.step === 'start') {
            app.innerHTML = `<h1 class="text-3xl font-black mb-6 text-center bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-blue-500">資安讚 | 數位診斷</h1><p class="text-slate-400 text-center mb-8">選擇您的行業類型</p><div class="flex flex-col gap-3">${Object.keys(quizData).map(ind => `<button onclick="selectInd('${ind}')" class="btn-choice p-4 rounded-xl font-bold text-left text-sm">${ind}</button>`).join('')}</div>`;
        } else if (state.step === 'role') {
            app.innerHTML = `<h2 class="text-2xl font-bold mb-8 text-center text-white">您的身分是？</h2><div class="flex flex-col gap-5"><button onclick="selectRole('老闆')" class="btn-choice p-6 rounded-2xl font-black text-xl text-center">老闆 / 主管</button><button onclick="selectRole('員工')" class="btn-choice p-6 rounded-2xl font-black text-xl text-center">員工 / 職員</button><button onclick="goBack()" class="back-btn">← 返回選擇行業</button></div>`;
        } else if (state.step === 'quiz') {
            const q = quizData[state.industry][state.role][state.currentQ];
            app.innerHTML = `<div class="mb-4 flex justify-between items-center text-[10px] font-bold tracking-widest text-sky-400"><span>PROGRESS ${state.currentQ + 1} / 10</span><span class="truncate ml-4">${state.industry}</span></div><div class="w-full bg-slate-800 h-1.5 rounded-full mb-8"><div class="bg-sky-500 h-1.5 rounded-full transition-all duration-500" style="width: ${(state.currentQ + 1) * 10}%"></div></div><h2 class="question-text">${q[0]}</h2><div class="flex flex-col gap-3">${[0, 5, 10, 15].map((s, i) => `<button onclick="answer(${s})" class="btn-choice p-4 rounded-xl font-medium border border-white/5">${q[i+1]}</button>`).join('')}</div><div onclick="goBack()" class="back-btn mt-8 py-3 border border-white/5 rounded-xl">← 返回上一題</div>`;
        } else if (state.step === 'result') {
            app.innerHTML = `<h2 class="text-2xl font-black mb-4 text-center text-white">測驗完成！</h2><p class="text-slate-400 text-center mb-8">輸入電子郵件，即刻解鎖深度診斷報告</p><input type="email" id="email" class="w-full bg-slate-900 border border-slate-700 p-5 rounded-2xl outline-none focus:border-sky-500 text-lg mb-6" placeholder="your-email@example.com"><button onclick="submit()" id="subBtn" class="w-full bg-sky-600 hover:bg-sky-500 py-5 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-lg shadow-sky-900/20">查看診斷結果</button><div id="msg" class="hidden text-center mt-6 text-sky-400 font-bold animate-pulse"><div class="loading-spinner"></div>正在運算風險數據與法律評估...</div>`;
        } else if (state.step === 'finish') {
            const isHigh = state.score >= 80;
            const isMid = state.score >= 40 && state.score < 80;
            let status = isHigh ? "🚨 極高危險：經營與法律危機" : (isMid ? "⚡ 中度風險：存在外洩漏洞" : "✅ 安全良好");
            let statusColor = isHigh ? "text-red-500" : (isMid ? "text-amber-500" : "text-emerald-500");
            let cardClass = isHigh ? "critical-alert bg-red-600/20" : "bg-slate-900/60";

            app.innerHTML = `
                <div class="text-center">
                    ${isHigh ? `<div class="mb-6 py-4 bg-red-600 text-white font-black text-xl animate-bounce rounded-xl shadow-2xl">⚠️ 重大資安警報：您已面臨法律訴訟風險</div>` : ''}
                    <h2 class="text-3xl font-black mb-2">數位風險報告</h2>
                    <p class="text-slate-500 mb-8 text-xs tracking-widest">報告編號：SR-${Math.floor(Math.random()*90000+10000)} | 數據已存證</p>
                    <div class="${cardClass} p-10 rounded-[32px] border border-white/10 mb-8 transition-all duration-1000">
                        <div id="animatedScore" class="text-9xl font-black mb-4 tracking-tighter ${statusColor}">100</div>
                        <div class="text-4xl font-black mb-6 ${statusColor} uppercase tracking-tighter">${status}</div>
                        <div class="text-left space-y-6 border-t border-white/10 pt-8">
                            ${isHigh ? `
                                <div class="flex gap-4 items-start"><span class="text-red-500 text-2xl">●</span><p class="text-lg text-slate-200"><b>法律訴訟：</b>依《個資法》第 47 條，外洩最高可處 <span class="text-red-500 font-black text-2xl underline decoration-red-500/50">1,500 萬元罰鍰</span>。</p></div>
                                <div class="flex gap-4 items-start"><span class="text-red-500 text-2xl">●</span><p class="text-lg text-slate-200"><b>刑事責任：</b>若涉及商業秘密外流，最高可處 5 年有期徒刑並併科罰金。</p></div>
                            ` : `
                                <div class="flex gap-3 items-start"><span class="${isMid?'text-amber-500':'text-emerald-500'} text-xl">●</span><p class="text-base text-slate-300 font-bold">${isMid?'現有流程存在明顯漏洞，隨時可能演變為刑事法律事件。':'資安意識優於平均，請持續保持分權管理與定期備份習慣。'}</p></div>
                            `}
                        </div>
                    </div>
                    <button onclick="location.reload()" class="w-full py-4 bg-white/5 hover:bg-white/10 rounded-xl text-slate-500 hover:text-white transition font-bold text-sm mb-4">重新掃描風險</button>
                    
                    <button onclick="goLeadPage()" class="w-full py-5 bg-gradient-to-r from-red-600 to-orange-600 hover:from-red-500 hover:to-orange-500 rounded-2xl text-white font-black text-xl transition-all active:scale-95 shadow-xl shadow-red-900/20">
                        您真的放心現有的資料庫安全嗎？
                    </button>
                </div>`;
            
            setTimeout(startScoreAnimation, 200);
        } else if (state.step === 'lead') {
            app.innerHTML = `
                <div class="text-center py-10">
                    <div class="mb-10 text-red-500">
                        <svg class="w-24 h-24 mx-auto animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <h2 class="text-3xl font-black mb-6 text-white leading-tight">資安漏洞可能就在<br><span class="text-red-500 underline">您的疏忽中產生...</span></h2>
                    <p class="text-xl text-slate-300 mb-12 font-medium">與其在災難發生後支付千萬賠償，不如現在就建立專業級的數位防線。</p>
                    <div class="p-6 bg-white/5 rounded-2xl mb-12 text-left italic text-slate-400 border-l-4 border-sky-500">
                        「我們不只是診斷風險，更為您的企業資產提供最後一道法律與技術防護。」
                    </div>
                    <button onclick="openForm()" class="w-full py-6 bg-sky-600 hover:bg-sky-500 rounded-2xl text-white font-black text-2xl transition-all active:scale-95 shadow-2xl">
                        立即填寫調查問卷，讓我們能給您最貼心的幫助
                    </button>
                    <button onclick="goBack()" class="back-btn mt-10">← 返回結果頁面</button>
                </div>`;
        }
    }

    function selectInd(i) { pushState({ step: 'role', industry: i }); }
    function selectRole(r) { pushState({ step: 'quiz', role: r, currentQ: 0, score: 0 }); }
    function answer(p) { if (state.currentQ < 9) pushState({ currentQ: state.currentQ + 1, score: state.score + p }); else pushState({ step: 'result', score: state.score + p }); }
    function pushState(newData) { state.history.push(JSON.parse(JSON.stringify(state))); state = { ...state, ...newData }; render(); }
    function goBack() { if (state.history.length > 0) { state = state.history.pop(); render(); } }

    function goLeadPage() {
        pushState({ step: 'lead' });
    }

    function openForm() {
        window.open("https://docs.google.com/forms/d/e/1FAIpQLSfyKcd3E9jPZL5JXlN8gJABMYpSP4kf6zbSiZ-tZCnr2KKZvg/viewform?entry.1332400305=jennycheng1116%40gmail.com", "_blank");
    }

    function startScoreAnimation() {
        const el = document.getElementById('animatedScore');
        if(!el) return;
        let current = 100;
        const target = state.score;
        const timer = setInterval(() => {
            if (current <= target) { clearInterval(timer); el.innerText = target; }
            else { current--; el.innerText = current; }
        }, 30);
    }

    async function submit() {
        const mail = document.getElementById('email').value;
        if(!mail.includes('@')) return alert('請輸入有效的電子郵件');
        state.email = mail; // 保存 Email
        const btn = document.getElementById('subBtn');
        const msg = document.getElementById('msg');
        btn.disabled = true; msg.classList.remove('hidden');
        const rankText = state.score >= 80 ? "極高危險" : (state.score >= 40 ? "中度風險" : "低度風險");
        try {
            // 保留 EmailJS
            await emailjs.send("service_2kl2ayr", "template_jsl6mbh", { user_email: mail, score: state.score, rank: rankText, industry: state.industry, role: state.role });
            // 保留 Google Sheet (Google Form 回傳)
            const body = new URLSearchParams({ "entry.1189791047": state.industry, "entry.1232382204": state.role, "entry.1872913577": state.score, "entry.1057217280": rankText, "entry.1218395545": mail });
            fetch(`https://docs.google.com/forms/d/e/1FAIpQLSfte6OLpSk5SRrs2SpICabxlPiRuNbyPUwVxpEaFAQHHY6G1Q/formResponse`, { method: "POST", mode: "no-cors", body: body });
            state.step = 'finish'; render();
        } catch (err) { alert('同步失敗，請檢查網路狀態'); btn.disabled = false; msg.classList.add('hidden'); }
    }
    window.onload = render;
</script>
</body>
</html>
