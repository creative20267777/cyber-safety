<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資安讚 | 數位遺產風險實錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("mX1YOSb8myOui7Bp3"); })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #0ea5e9; --danger-red: #ff4d4d; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617 90%);
            background-color: #020617;
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #f8fafc; padding: 16px;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px;
            width: 100%; max-width: 600px; padding: 2.5rem; box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative; overflow: hidden;
        }
        .glass-card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(14, 165, 233, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }
        .btn-choice {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 1rem; line-height: 1.5;
        }
        .btn-choice:hover { 
            background: rgba(14, 165, 233, 0.15); border-color: var(--primary-blue); 
            transform: translateX(8px); box-shadow: -4px 0 0 var(--primary-blue);
        }
        .question-text { font-size: 1.4rem; line-height: 1.4; font-weight: 700; margin-bottom: 2rem; color: #fff; letter-spacing: -0.02em; }
        .score-num { font-size: 9rem; line-height: 1; font-weight: 900; letter-spacing: -6px; }
        .critical-pulse { animation: critical-glow 1.5s infinite alternate; }
        @keyframes critical-glow {
            from { text-shadow: 0 0 10px rgba(255, 77, 77, 0.2); transform: scale(1); }
            to { text-shadow: 0 0 30px rgba(255, 77, 77, 0.6); transform: scale(1.03); }
        }
        input[type="email"] {
            background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; padding: 1.2rem; border-radius: 16px; width: 100%; font-size: 1.1rem;
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app" class="glass-card"></div>

<script>
    const quizData = {
        "🏥 醫療 / 診所": {
            "老闆": [
                ["在這個數位時代，病患的信任取決於資料安全。請問您的病歷與檢查結果目前如何儲存？", "系統集中管理，定期備份且加密", "部分存於雲端或硬碟，未統一管理", "紙本與數位混用，無固定標準", "分散在各員工電腦或行動設備"],
                ["內部的權限就像診所的門禁。醫師、護理與櫃檯的資料存取權限是否明確區分？", "權限嚴格分級，僅看必要資訊", "部分權限重疊，但有基本控制", "多數員工擁有廣泛的存取權限", "完全無區分，所有人都能看"],
                ["合作夥伴也可能是風險來源。您是否與外部廠商簽署過個資保密協定？", "所有廠商皆簽署並定期稽核", "僅重點廠商簽署，缺乏後續查核", "口頭協議為主，無正式合約", "從未簽署任何保密協定"],
                ["如果今天系統突然故障，您的病歷備援機制能在多久內讓診所恢復營運？", "具備異地備份，1小時內恢復", "有本地備份，但恢復需長時間", "僅有單機備份，損毀恐無法救回", "完全無備份，遺失即永久消失"],
                ["員工是第一道防線。您是否定期對員工進行數位資安意識訓練？", "每年至少兩次專業教育訓練", "新進員工有說明，之後無", "偶爾在開會時口頭提醒", "從未進行過任何相關培訓"],
                ["診所內的電腦，目前是否都有安裝商用等級的防毒與防火牆？", "全數安裝並由後台統一管理", "全數安裝但由員工自行管理", "僅部分重要電腦有安裝", "皆無安裝或僅使用過期試用版"],
                ["許多病患會透過通訊軟體傳送資料，這些敏感訊息您如何處理？", "轉入系統後立即刪除通訊紀錄", "存入系統但紀錄長期保留", "直接留在軟體中，未整理", "隨意轉發給不相關的員工處理"],
                ["資安需要專業維護。您目前是否有專人或委外團隊負責定期的資安檢查？", "有長期合作團隊且定期報告", "有維護團隊但僅在出事時聯繫", "由懂電腦的員工兼職管理", "完全無人管理，自生自滅"],
                ["對於汰換的電腦或舊硬碟，您的報廢處理流程為何？", "物理毀損並開立消磁證明", "格式化後委託資源回收處理", "直接當作一般廢棄物丟棄", "堆放在倉庫，無人監管"],
                ["面對日益增加的個資外洩訴訟，您目前是否有投保相關的資安保險？", "已投保且額度足以覆蓋風險", "曾考慮投保但目前尚未簽約", "不知道有這類保險可以投保", "認為不需要，不會發生在我身上"]
            ],
            "員工": [
                ["身為第一線，你覺得目前能看到的病患資料是否超出了你的工作必要？", "僅能看到我負責的必要資訊", "能看到大部分病患，但不含病歷", "權限很大，可隨意瀏覽資料", "完全無控管，誰都能看所有資料"],
                ["在忙碌時，你是否曾在私人設備（如手機）上開啟或儲存病患資料？", "從不，僅限診所內公務設備", "偶爾為了回報進度會截圖存手機", "經常為了方便在私人筆電處理", "會存入私人雲端方便隨時聯繫"],
                ["若發現同事隨意翻閱非其職責內的病患資料，你的反應通常是？", "立即勸阻並向上級主管呈報", "口頭提醒同事這樣做不合適", "認為沒什麼大不了，不予理會", "跟著一起討論，分享八卦訊息"],
                ["為了方便交接，診所電腦的帳號密碼是否會在同事間共享？", "每人獨立帳號，絕不外洩密碼", "有公用帳號，但僅限特定人", "密碼貼在螢幕旁，大家都能用", "完全不設密碼，開機就能操作"],
                ["你清楚若不慎外洩病患個資，自己可能面臨的刑事責任或法律賠償嗎？", "非常清楚，知道責任重大", "略知一二，知道會被診所懲處", "不太清楚，覺得只是工作疏失", "完全不知道，以為沒被發現就好"],
                ["當病患詢問診所如何保護他們的資料安全時，你通常如何回答？", "專業說明機制，讓病患安心", "模糊帶過，告知診所都有處理", "坦言不清楚，要病患去問醫師", "告知不安全，建議病患多加防範"],
                ["在電腦上查資料時，你對於彈出的不明醫療廣告或連結的警覺性？", "警覺性高，絕不點擊不明連結", "偶爾點擊，但會注意網站真偽", "為了尋找資訊，常會點擊連結", "什麼都點，覺得中毒機率很低"],
                ["離開診間或櫃檯座位時，你是否有手動鎖定電腦螢幕的習慣？", "每次離開皆養成鎖定習慣", "設定自動鎖定，但偶爾忘記", "很少鎖定，覺得離開時間不長", "從不鎖定，嫌輸入密碼太麻煩"],
                ["對於印錯或過時的病患單據，你通常如何處理這些廢紙？", "必先經過碎紙機才丟棄", "簡單撕毀後丟棄，未確實碎紙", "直接整疊丟棄，未做任何處理", "會拿來當背面紙，重複利用"],
                ["如果你發現系統有一個可能洩漏資料的漏洞，你會怎麼做？", "主動回報並追蹤是否改善", "會口頭提及，但不管是否改善", "多一事不如少一事，裝作沒看到", "覺得那是公司的事，與我無關"]
            ]
        },
        "🛍️ 零售業": { "老闆": [ ["客戶資料是零售業的命脈，您的客戶電話與消費紀錄目前存在何處？", "集中於專業系統，有分層授權", "存於雲端硬碟，多人共享帳號", "分散於各店長的手機與記事本", "完全沒有紀錄，隨到隨買"] /* 零售題庫...以此類推 */ ] },
        "🏢 中小企業": { "老闆": [ ["公司的商業機密（如報價、合約）目前存放在哪裡？", "集中式雲端，有嚴格權限控管", "存於各部門電腦，部分共享", "存於老闆或秘書私人電腦中", "放在共用的隨身碟裡傳遞"] ] },
        "🍽️ 餐飲業": { "老闆": [ ["每天處理大量外送，訂單上的客戶個資您如何防止外洩？", "轉入系統後遮蔽敏感資訊", "整張單據交付外送員，無防護", "單據隨處擺放，顧客也能看見", "完全沒考慮過這個問題"] ] },
        "🏭 製造 / 工程": { "老闆": [ ["研發圖紙與核心製程是競爭力所在，目前的存放安全性如何？", "內網實體隔離，具備高度加密", "具備加密措施，但無權限管理", "存於一般雲端，方便廠商存取", "隨意放在各電腦桌面，未加密"] ] },
        "💼 金融 / 專業服務": { "老闆": [ ["法律要求極高，您是否定期執行系統漏洞與個資風險盤點？", "定期執行專業查核並有報告", "偶爾盤點，缺乏系統化追蹤", "沒做過，覺得那是浪費時間", "盤點後不改善，只為應付法規"] ] },
        "🧑‍💻 IT / 科技產業": { "老闆": [ ["代碼即資產，您的 Git 權限是否依專案與職位嚴格分工？", "是，採最小權限原則並有稽核", "部分分工，但權限控制仍過寬", "所有人都有 Admin 權限，省事", "根本沒用版本管理，資料亂丟"] ] },
        "📦 其他": { "老闆": [ ["您的客戶聯絡清單目前主要儲存在何處？", "雲端加密系統，定期稽核存取", "手機隨意記錄，缺乏統一管理", "散落在各員工的記事本中", "完全沒記錄，靠大腦記憶"] ] }
    };

    let state = { step: 'start', industry: '', role: '', currentQ: 0, score: 0, history: [], guideStep: 0 };

    function render() {
        const app = document.getElementById('app');
        
        if (state.step === 'start') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <div class="inline-block px-3 py-1 border border-sky-500/30 rounded-full text-[10px] text-sky-400 font-bold mb-4 tracking-tighter">PREMIUM DIAGNOSTIC</div>
                    <h1 class="text-4xl font-black mb-4 tracking-tight text-white">數位資產風險診斷</h1>
                    <p class="text-slate-400 mb-10 leading-relaxed">在這個數據即金錢的年代，<br>您的企業真的「安全」嗎？請選擇您的行業：</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${Object.keys(quizData).map(ind => `<button onclick="selectInd('${ind}')" class="btn-choice p-4 rounded-2xl text-left font-bold">${ind}</button>`).join('')}
                    </div>
                </div>`;
        } 
        else if (state.step === 'role') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <h2 class="text-2xl font-bold mb-8 text-white">診斷的第一步...</h2>
                    <p class="text-slate-400 mb-10">角色位置決定了風險的維度。<br>您的職位是？</p>
                    <div class="flex flex-col gap-4">
                        <button onclick="selectRole('老闆')" class="btn-choice p-6 rounded-3xl font-black text-xl text-center border-white/20">老闆 / 決策者</button>
                        <button onclick="selectRole('員工')" class="btn-choice p-6 rounded-3xl font-black text-xl text-center border-white/20">員工 / 執行者</button>
                    </div>
                    <button onclick="goBack()" class="mt-8 text-slate-500 hover:text-white transition">← 返回重新開始</button>
                </div>`;
        } 
        else if (state.step === 'quiz') {
            const questions = quizData[state.industry][state.role];
            const q = questions[state.currentQ];
            app.innerHTML = `
                <div class="fade-in">
                    <div class="flex justify-between items-end mb-6">
                        <div class="text-[10px] font-black text-sky-500 tracking-widest uppercase">SCANNING... STEP ${state.currentQ+1}/10</div>
                        <div class="h-1 w-24 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-sky-500" style="width: ${(state.currentQ+1)*10}%"></div></div>
                    </div>
                    <h2 class="question-text">${q[0]}</h2>
                    <div class="flex flex-col gap-3">
                        <button onclick="answer(0)" class="btn-choice p-4 rounded-xl text-slate-300">${q[1]}</button>
                        <button onclick="answer(15)" class="btn-choice p-4 rounded-xl text-slate-300">${q[2]}</button>
                        <button onclick="answer(25)" class="btn-choice p-4 rounded-xl text-slate-300">${q[3]}</button>
                        <button onclick="answer(35)" class="btn-choice p-4 rounded-xl text-slate-300">${q[4]}</button>
                    </div>
                </div>`;
        } 
        else if (state.step === 'guide') {
            const isCritical = state.score >= 70;
            const statusColor = isCritical ? "text-red-500" : "text-orange-500";
            const storyText = isCritical ? "警告：您的數位防線已近乎崩潰。" : "注意：您的防線存在明顯裂縫。";

            const guide = [
                { q: "您擔心這些隱藏的漏洞，會在未來變成不可挽回的損失嗎？", btn: "是的，我必須解決" },
                { q: "我們準備了一套「合規且高效」的自動化方案。想看看如何改善嗎？", btn: "查看我的改善建議" }
            ];

            app.innerHTML = `
                <div class="fade-in text-center">
                    <div class="score-num ${statusColor} ${isCritical ? 'critical-pulse' : ''}">${state.score}</div>
                    <div class="text-xl font-black mb-4 ${statusColor} tracking-widest">${storyText}</div>
                    <hr class="border-white/5 my-8">
                    <h2 class="text-2xl font-bold mb-10 leading-tight text-white">${guide[state.guideStep].q}</h2>
                    <button onclick="nextGuide()" class="w-full bg-sky-600 hover:bg-sky-500 py-5 rounded-2xl font-black text-xl shadow-2xl transition-all">
                        ${guide[state.guideStep].btn}
                    </button>
                </div>`;
        }
        else if (state.step === 'email') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <h2 class="text-3xl font-black mb-4 text-white">領取您的診斷報告</h2>
                    <p class="text-slate-400 mb-8">為了發送完整的風險優化清單與建議，<br>請留下您的電子郵件：</p>
                    <input type="email" id="userEmail" placeholder="您的電子信箱" required class="mb-6">
                    <button onclick="finalSubmit()" id="submitBtn" class="w-full bg-red-600 hover:bg-red-500 py-5 rounded-2xl font-black text-xl shadow-xl transition-all">
                        送出並跳轉諮詢表單
                    </button>
                    <p class="text-[10px] text-slate-600 mt-6 tracking-widest">SUBMIT TO LOCK IN YOUR APPOINTMENT</p>
                </div>`;
        }
    }

    function selectInd(i) { pushState({ step: 'role', industry: i }); }
    function selectRole(r) { pushState({ step: 'quiz', role: r, currentQ: 0, score: 0 }); }
    function answer(p) { 
        if (state.currentQ < 9) { state.currentQ++; state.score += p; render(); } 
        else { state.score += p; pushState({ step: 'guide', guideStep: 0 }); }
    }
    function nextGuide() {
        if (state.guideStep < 1) { state.guideStep++; render(); } 
        else { state.step = 'email'; render(); }
    }
    function pushState(newData) { state.history.push(JSON.parse(JSON.stringify(state))); state = { ...state, ...newData }; render(); }
    function goBack() { if (state.history.length > 0) { state = state.history.pop(); render(); } }

    async function finalSubmit() {
        const email = document.getElementById('userEmail').value;
        if (!email.includes('@')) { alert('格式不正確'); return; }
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "加密傳輸中...";

        const rankText = state.score >= 70 ? "極高風險" : (state.score >= 40 ? "中度風險" : "低度風險");
        const finalUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfyKcd3E9jPZL5JXlN8gJABMYpSP4kf6zbSiZ-tZCnr2KKZvg/viewform";

        try {
            // 背景同步
            const body = new URLSearchParams({ "entry.1189791047": state.industry, "entry.1232382204": state.role, "entry.1872913577": state.score, "entry.1057217280": rankText, "entry.1111111111": email });
            fetch(`https://docs.google.com/forms/d/e/1FAIpQLSfte6OLpSk5SRrs2SpICabxlPiRuNbyPUwVxpEaFAQHHY6G1Q/formResponse`, { method: "POST", mode: "no-cors", body: body });

            // EmailJS
            await emailjs.send("service_7o6i6un", "template_48fngls", { user_email: email, score: state.score, industry: state.industry, rank: rankText });

            window.location.href = finalUrl;
        } catch (e) {
            window.location.href = finalUrl;
        }
    }

    window.onload = render;
</script>
</body>
</html>
