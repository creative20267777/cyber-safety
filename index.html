</head>

<div class="container" id="app">
    <div id="step-select">
        <h1>數位風險診斷</h1>
        <p style="text-align:center; color:#64748b;">請選擇您的行業</p>
        <div class="grid-select">
            <button class="select-btn" onclick="setIndustry('醫療')">🏥 醫療 / 診所</button>
            <button class="select-btn" onclick="setIndustry('零售業')">🛍️ 零售業 / 電商</button>
            <button class="select-btn" onclick="setIndustry('中小企業')">🏢 中小企業</button>
            <button class="select-btn" onclick="setIndustry('金融專業')">💼 金融 / 法律</button>
            <button class="select-btn" onclick="setIndustry('製造工程')">🏭 製造 / 工程</button>
            <button class="select-btn" onclick="setIndustry('IT科技')">🧑‍💻 IT / 科技</button>
            <button class="select-btn" onclick="setIndustry('餐飲業')">🍽️ 餐飲業</button>
            <button class="select-btn" onclick="setIndustry('其他')">📦 其他 / 自由職</button>
        </div>
        <div id="role-area" class="hidden" style="margin-top:20px; text-align:center; border-top:1px solid #eee; padding-top:20px;">
            <p>您的身分是？</p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="select-btn" onclick="startQuiz('老闆')">我是老闆/主管</button>
                <button class="select-btn" onclick="startQuiz('員工')">我是員工/職員</button>
            </div>
        </div>
    </div>

    <div id="step-quiz" class="hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="question-text" class="question-text"></span>
        <div id="options"></div>
    </div>

    <div id="step-email" class="hidden" style="text-align:center;">
        <h2>診斷完成！</h2>
        <p>分析報告已準備就緒，請輸入 Email 接收。</p>
        <input type="email" id="user-email" placeholder="請輸入您的電子郵件" required>
        <button class="submit-btn" onclick="submitResult()">獲取報告並儲存</button>
        <p id="status-msg" style="font-size:0.8rem; color:#64748b; margin-top:10px;"></p>
    </div>

    <div id="step-finish" class="hidden" style="text-align:center;">
        <h2 style="color:#059669;">發送成功！</h2>
        <div style="font-size:3rem; font-weight:bold; color:var(--primary-color); margin:10px 0;" id="final-score">0</div>
        <p id="final-rank" style="font-weight:bold;"></p>
        <p>請檢查您的信箱（包含垃圾郵件箱）。</p>
        <button class="submit-btn" style="background:#64748b" onclick="location.reload()">重新測驗</button>
    </div>
</div>

    let currentIndustry = "", currentRole = "", currentQuestions = [], currentStep = 0, totalScore = 0;

    function setIndustry(ind) {
        currentIndustry = ind;
        document.getElementById('role-area').classList.remove('hidden');
    }

    function startQuiz(role) {
        currentRole = role;
        currentQuestions = quizData[currentIndustry][currentRole];
        document.getElementById('step-select').classList.add('hidden');
        document.getElementById('step-quiz').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentStep];
        document.getElementById('question-text').innerText = `${currentStep + 1}. ${q[0]}`;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = "";
        const scores = [10, 6, 3, 0];
        for (let i = 1; i <= 4; i++) {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = q[i];
            btn.onclick = () => nextStep(scores[i-1]);
            optionsDiv.appendChild(btn);
        }
        document.getElementById('progress-fill').style.width = `${(currentStep / currentQuestions.length) * 100}%`;
    }

    function nextStep(points) {
        totalScore += points;
        currentStep++;
        if (currentStep < currentQuestions.length) showQuestion();
        else {
            document.getElementById('step-quiz').classList.add('hidden');
            document.getElementById('step-email').classList.remove('hidden');
        }
    }

    function getRank(score) {
        if (score >= 90) return "極低風險";
        if (score >= 70) return "低度風險";
        if (score >= 50) return "中度風險";
        return "高度風險";
    }

    function submitResult() {
        const email = document.getElementById('user-email').value;
        if (!email || !email.includes('@')) { alert("請輸入有效的 Email"); return; }
        
        document.getElementById('status-msg').innerText = "報告發送並存檔中...";
        const rankText = getRank(totalScore);

        // 1. 發送 EmailJS
        emailjs.send("service_2kl2ayr", "template_jsl6mbh", {
            user_email: email,
            score: totalScore,
            rank: rankText,
            industry: currentIndustry,
            role: currentRole
        });

        // 2. 自動提交到 Google 表單 (背景傳送)
        const formID = "1FAIpQLSfte6OLpSk5SRrs2SpICabxlPiRuNbyPUwVxpEaFAQHHY6G1Q";
        const formData = new URLSearchParams();
        formData.append("entry.1189791047", currentIndustry);
        formData.append("entry.1232382204", currentRole);
        formData.append("entry.1872913577", totalScore);
        formData.append("entry.1057217280", rankText);
        formData.append("entry.1218395545", email);

        fetch(`https://docs.google.com/forms/d/e/${formID}/formResponse`, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: formData.toString()
        });

        // 3. 顯示結果頁
        document.getElementById('step-email').classList.add('hidden');
        document.getElementById('step-finish').classList.remove('hidden');
        document.getElementById('final-score').innerText = totalScore;
        document.getElementById('final-rank').innerText = rankText;
    }
