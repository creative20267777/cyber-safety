            background: rgba(14, 165, 233, 0.15); border-color: var(--primary-blue); 
            transform: translateX(8px); box-shadow: -4px 0 0 var(--primary-blue);
        }
        .question-text { font-size: 1.4rem; line-height: 1.4; font-weight: 700; margin-bottom: 2rem; color: #fff; }
        
        /* 分數閃爍與跳動動畫 */
        .score-num { font-size: 9rem; line-height: 1; font-weight: 900; letter-spacing: -6px; }
        .critical-pulse { animation: critical-glow 0.8s infinite alternate; }
        @keyframes critical-glow {

            to { text-shadow: 0 0 40px rgba(255, 77, 77, 0.8); transform: scale(1.05); }
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

                 ["如果有員工外洩資料，您有無合約條款可以自保？", "有完整資安保密條款", "只有一般勞動合約", "口頭協議", "無合約"],
                 ["對於員工報廢的硬體設備，公司如何處理？", "專業消磁並毀損硬碟", "整機變賣回收", "隨便丟在回收區", "不知道硬體有殘留數據"],
                 ["您認為資安是為了省麻煩，還是為了保命？", "保命符，一出事就是破產", "只是為了應付合規", "可有可無", "浪費錢"],
                 ["對於公司網站的安全性，您是否有基本認知？", "具備 SSL 與基礎防護", "有網站就好不清楚安全", "完全沒管", "不知道網站會被駭"]
            ],
            "員工": [
                 ["你會將顧客的訂單訊息拍照發到社群軟體聊天嗎？", "絕對禁止", "為了方便溝通會拍照", "覺得有趣會分享", "這沒什麼"],
                 ["你在使用公務電腦時，會下載不明的小軟體或遊戲嗎？", "嚴禁私下下載不明檔案", "會偷偷下載工具軟體", "會下載遊戲打發時間", "想載就載"],
                 ["對於客人的身分資料，你會如何處理過期的單據？", "碎紙機徹底銷毀", "撕成兩半丟垃圾桶", "整張丟進垃圾桶", "當作背面紙重複利用"],
                 ["你清楚洩漏他人個資，受害者最高可求償每件 20 萬元嗎？", "清楚法規責任", "大概知道有罰錢", "不知道", "不覺得會被告"],
                 ["離開座位時，你會鎖定電腦畫面嗎？", "每次離開皆養成習慣", "偶爾忘記", "很少鎖定", "不鎖定"],
                 ["你會隨意在公司的電腦上插個人隨身碟看影片嗎？", "不插外部不明設備", "為了資料傳遞會插", "想看就插", "沒警覺"],
                 ["你的密碼是否包含生日、電話等容易被猜中的資訊？", "密碼具備隨機性且高強度", "密碼包含生日但有加符號", "密碼就是電話或生日", "密碼超簡單"],
                 ["如果有陌生人自稱維修員要動你的電腦，你會？", "嚴格核對身分並通報主管", "讓他直接修", "口頭問一下", "不管他"],
                 ["你認為保護公司的資產安全性，對你的職涯有加分嗎？", "是，這是職場素養", "無感", "不覺得", "沒想過"],
                 ["你會將公家帳號密碼寫在筆記本上放在桌面上嗎？", "絕對保密密碼", "會寫在不顯眼處", "寫在大記事本上", "大家都看得到"]
            ]
        }
    };

    let state = { step: 'start', industry: '', role: '', currentQ: 0, score: 0, history: [], guideStep: 0 };

    function render() {
        const app = document.getElementById('app');
        
        if (state.step === 'start') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <h1 class="text-4xl font-black mb-4 text-white">數位資產風險診斷</h1>
                    <p class="text-slate-400 mb-10">選擇行業，開始精準體檢：</p>
                    <div class="grid grid-cols-1 gap-3">
                        ${Object.keys(quizData).map(ind => `<button onclick="selectInd('${ind}')" class="btn-choice p-4 rounded-2xl font-bold">${ind}</button>`).join('')}
                    </div>
                </div>`;
        } 
        else if (state.step === 'role') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <h2 class="text-2xl font-bold mb-8 text-white">您的職位是？</h2>
                    <div class="flex flex-col gap-4">
                        <button onclick="selectRole('老闆')" class="btn-choice p-6 rounded-3xl font-black text-xl text-center">老闆 / 決策者</button>
                        <button onclick="selectRole('員工')" class="btn-choice p-6 rounded-3xl font-black text-xl text-center">員工 / 執行者</button>
                    </div>
                    <button onclick="goBack()" class="mt-8 text-slate-500 hover:text-white transition">← 返回重新選擇</button>
                </div>`;
        } 
        else if (state.step === 'quiz') {
            const questions = quizData[state.industry][state.role];
            const q = questions[state.currentQ];
            app.innerHTML = `
                <div class="fade-in">
                    <div class="flex justify-between items-end mb-6">
                        <div class="text-[10px] font-black text-sky-500 tracking-widest uppercase">SCANNING... STEP ${state.currentQ+1}/10</div>
                        <div class="h-1 w-24 bg-white/5 rounded-full overflow-hidden"><div class="h-full bg-sky-500" style="width: ${(state.currentQ+1)*10}%"></div></div>
                    </div>
                    <h2 class="question-text">${q[0]}</h2>
                    <div class="flex flex-col gap-3">
                        <button onclick="answer(0)" class="btn-choice p-4 rounded-xl text-slate-300 hover:text-white">${q[1]}</button>
                        <button onclick="answer(15)" class="btn-choice p-4 rounded-xl text-slate-300 hover:text-white">${q[2]}</button>
                        <button onclick="answer(25)" class="btn-choice p-4 rounded-xl text-slate-300 hover:text-white">${q[3]}</button>
                        <button onclick="answer(35)" class="btn-choice p-4 rounded-xl text-slate-300 hover:text-white">${q[4]}</button>
                    </div>
                    <button onclick="goBack()" class="mt-8 text-slate-500 text-sm hover:text-white transition">← 返回上一題</button>
                </div>`;
        } 
        else if (state.step === 'guide') {
            const finalScore = Math.min(state.score, 100);
            const isCritical = finalScore >= 70;
            const statusColor = isCritical ? "text-red-500" : "text-orange-500";
            
            const storyLine = [
                { 
                    q: "這分數背後隱藏著巨大的法律危機。<br>您對現有的資料系統感到「真的放心」嗎？", 
                    btn: "坦白說，我並不放心",
                    warn: `⚠️ 警告：個資法罰鍰最高可達 **1,500 萬元**，且負責人須負刑事責任。`
                },
                { 
                    q: "很多企業想改善卻步，是因為擔憂...<br>「系統安裝完後，員工真的會用嗎？」", 
                    btn: "是的，我擔心操作太複雜",
                    warn: `🚨 您目前的防線漏洞，平均每月讓企業損失高達 **30% 的潛在品牌信任度**。`
                },
                { 
                    q: "最後一個關鍵：您是否認為資安就是一筆「昂貴且看不到回報」的成本？", 
                    btn: "確實有這層顧慮",
                    warn: `💡 我們提供的是「自動化防護」，不影響效率且符合法規，將風險降至趨近於零。`
                }
            ];

            const currentStory = storyLine[state.guideStep];

            app.innerHTML = `
                <div class="fade-in text-center">
                    <div class="score-num ${statusColor} ${isCritical ? 'critical-pulse' : ''}">${finalScore}</div>
                    <div class="text-xl font-black mb-4 ${statusColor} tracking-widest">${isCritical ? '⚠️ 極高風險狀態' : '🚨 中度風險警示'}</div>
                    
                    <p class="text-sm text-red-400/80 bg-red-950/30 p-4 rounded-xl mb-8 leading-relaxed font-bold border border-red-500/20">
                        ${currentStory.warn}
                    </p>

                    <hr class="border-white/5 my-8">
                    
                    <h2 class="text-2xl font-bold mb-10 leading-tight text-white">${currentStory.q}</h2>
                    
                    <button onclick="nextGuide()" class="w-full bg-sky-600 hover:bg-sky-500 py-5 rounded-2xl font-black text-xl shadow-2xl transition-all active:scale-95">
                        ${currentStory.btn}
                    </button>
                    <button onclick="goBack()" class="mt-8 text-slate-500 text-sm hover:text-white transition">← 返回修改診斷答案</button>
                </div>`;
        }
        else if (state.step === 'email') {
            app.innerHTML = `
                <div class="fade-in text-center">
                    <h2 class="text-3xl font-black mb-4 text-white">解決您的數位焦慮</h2>
                    <p class="text-slate-400 mb-8">留下 Email，領取針對您行業的「低成本資安優化清單」，並跳轉至專家預約表單。</p>
                    <input type="email" id="userEmail" placeholder="您的電子信箱" required class="mb-6">
                    <button onclick="finalSubmit()" id="submitBtn" class="w-full bg-red-600 hover:bg-red-500 py-5 rounded-2xl font-black text-xl shadow-xl transition-all">
                        送出並獲取解決方案
                    </button>
                </div>`;
        }
    }

    function selectInd(i) { pushState({ step: 'role', industry: i }); }
    function selectRole(r) { pushState({ step: 'quiz', role: r, currentQ: 0, score: 0 }); }
    
    function answer(p) { 
        let nextScore = state.score + p;
        if (state.currentQ < 9) { 
            pushState({ currentQ: state.currentQ + 1, score: nextScore }); 
        } else { 
            pushState({ step: 'guide', guideStep: 0, score: nextScore }); 
        }
    }

    function nextGuide() {
        if (state.guideStep < 2) { 
            state.guideStep++; 
            render(); 
        } else { 
            state.step = 'email'; 
            render(); 
        }
    }

    function pushState(newData) { 
        state.history.push(JSON.parse(JSON.stringify(state))); 
        state = { ...state, ...newData }; 
        render(); 
    }

    function goBack() { 
        if (state.history.length > 0) { 
            state = state.history.pop(); 
            render(); 
        } 
    }

    async function finalSubmit() {
        const email = document.getElementById('userEmail').value;
        if (!email.includes('@')) { alert('格式不正確'); return; }
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "傳送中...";
        const finalScore = Math.min(state.score, 100);
        const rankText = finalScore >= 70 ? "極高風險" : (finalScore >= 40 ? "中度風險" : "低度風險");
        const finalUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfyKcd3E9jPZL5JXlN8gJABMYpSP4kf6zbSiZ-tZCnr2KKZvg/viewform";

        try {
            const body = new URLSearchParams({ "entry.1189791047": state.industry, "entry.1232382204": state.role, "entry.1872913577": finalScore, "entry.1057217280": rankText, "entry.1111111111": email });
            fetch(`https://docs.google.com/forms/d/e/1FAIpQLSfte6OLpSk5SRrs2SpICabxlPiRuNbyPUwVxpEaFAQHHY6G1Q/formResponse`, { method: "POST", mode: "no-cors", body: body });
            await emailjs.send("service_7o6i6un", "template_48fngls", { user_email: email, score: finalScore, industry: state.industry, rank: rankText });
            window.location.href = finalUrl;
        } catch (e) {
            window.location.href = finalUrl;
        }
    }
    window.onload = render;
</script>
</body>
</html>
